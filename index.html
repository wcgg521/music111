<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background-image: url("https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/723cdb500c734b2c9c876badb29af3b6.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000 !important;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .music-player {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 22px;
            padding: 45px 35px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #song-name {
            font-size: 20px;
            margin: 18px 0;
            font-weight: bold;
        }

        #lyrics {
            height: 60px;
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            margin: 20px 0;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-top: 30px;
        }

        button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.25);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="music-player">
        <h1>🎵 我的音乐空间</h1>
        <div id="song-name">加载中...</div>
        <div id="lyrics">欢迎聆听</div>

        <div class="controls">
            <button id="prev">⏮️</button>
            <button id="play">▶️</button>
            <button id="next">⏭️</button>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const musicList = [
            {
                name: "Tokyo Hot",
                url: "https://github.com/wcgg521/my-music/raw/refs/heads/main/Tokyo_Hot-Z3BROTHER.mp3",
                lyrics: "同 | 意 | 哦 ~"
            }
        ];

        let currentIndex = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const songName = document.getElementById('song-name');
        const lyrics = document.getElementById('lyrics');

        function loadSong(index) {
            const song = musicList[index];
            audio.src = song.url;
            songName.innerText = song.name;
            lyrics.innerText = song.lyrics;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸️";
            } else {
                audio.pause();
                playBtn.innerText = "▶️";
            }
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + musicList.length) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % musicList.length;
            loadSong(currentIndex);
            audio.play();
            playBtn.innerText = "⏸️";
        }

        audio.addEventListener('ended', nextSong);
        playBtn.addEventListener('click', togglePlay);
        document.getElementById('prev').onclick = prevSong;
        document.getElementById('next').onclick = nextSong;

        window.addEventListener('DOMContentLoaded', () => {
            loadSong(0);
            setTimeout(() => {
                audio.play().then(() => playBtn.innerText = "⏸️").catch(()=>{});
            }, 600);
        });
    </script>
</body>
</html>
